services:
  mysql:
    image: mysql:8.0
    container_name: clinica-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinica_auth
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - clinica-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  config-server:
    build: ./config-server
    container_name: config-server
    environment:
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: https://github.com/clinica-odontologica-if/clinica-configs.git
      SPRING_CLOUD_CONFIG_SERVER_GIT_USERNAME: ${GIT_USERNAME}
      SPRING_CLOUD_CONFIG_SERVER_GIT_PASSWORD: ${GIT_TOKEN}
    ports:
      - "8888:8888"
    networks:
      - clinica-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s



  servico-autenticacao:
    build: ./servico-autenticacao
    container_name: clinica-auth
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      ADMIN_SENHA_GERENTE: ${ADMIN_SENHA_GERENTE}
      ADMIN_SENHA_ATENDENTE: ${ADMIN_SENHA_ATENDENTE}
      ADMIN_SENHA_DENTISTA: ${ADMIN_SENHA_DENTISTA}
      ADMIN_SENHA_AUXILIAR: ${ADMIN_SENHA_AUXILIAR}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - clinica-net

  servico-paciente:
    build: ./servico-paciente
    container_name: clinica-paciente
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - clinica-net

  frontend-autenticacao:
    build: ./frontend-autenticacao
    container_name: clinica-auth-frontend
    ports:
      - "3000:80"
    depends_on:
      - servico-autenticacao
    networks:
      - clinica-net

volumes:
  mysql_data:

networks:
  clinica-net:
    driver: bridge
