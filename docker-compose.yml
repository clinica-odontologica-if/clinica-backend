services:
  mysql:
    image: mysql:8.0
    container_name: clinica-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinica_auth
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - clinica-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mysql-profissional:
    image: mysql:8.0
    container_name: clinica-mysql-profissional
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinica_profissional
    ports:
      - "3308:3306"
    volumes:
      - mysql_profissional_data:/var/lib/mysql
    networks:
      - clinica-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mysql-paciente:
    image: mysql:8.0
    container_name: clinica-mysql-paciente
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinica_paciente
    ports:
      - "3309:3306"
    volumes:
      - mysql_paciente_data:/var/lib/mysql
    networks:
      - clinica-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mysql-atendimento:
    image: mysql:8.0
    container_name: clinica-mysql-atendimento
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinica_atendimento
    ports:
      - "3310:3306"
    volumes:
      - mysql_atendimento_data:/var/lib/mysql
    networks:
      - clinica-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  config-server:
    build: ./config-server
    container_name: config-server
    environment:
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: https://github.com/clinica-odontologica-if/clinica-configs.git
      SPRING_CLOUD_CONFIG_SERVER_GIT_USERNAME: ${GIT_USERNAME}
      SPRING_CLOUD_CONFIG_SERVER_GIT_PASSWORD: ${GIT_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8888:8888"
    networks:
      - clinica-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - clinica-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  servico-autenticacao:
    build: ./servico-autenticacao
    container_name: clinica-auth
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://clinica-mysql:3306/clinica_auth
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SENHA_GERENTE: ${ADMIN_SENHA_GERENTE}
      ADMIN_SENHA_ATENDENTE: ${ADMIN_SENHA_ATENDENTE}
      ADMIN_SENHA_DENTISTA: ${ADMIN_SENHA_DENTISTA}
      ADMIN_SENHA_AUXILIAR: ${ADMIN_SENHA_AUXILIAR}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - clinica-net

  servico-profissional:
    build: ./servico-profissional
    container_name: clinica-profissional
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_PROFISSIONAL_URL: jdbc:mysql://clinica-mysql-profissional:3306/clinica_profissional
      SPRING_DATASOURCE_PROFISSIONAL_USERNAME: root
      SPRING_DATASOURCE_PROFISSIONAL_PASSWORD: root
      SERVICO_AUTENTICACAO_URL: http://servico-autenticacao:8081
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8082"
    depends_on:
      mysql-profissional:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - clinica-net

  servico-paciente:
    build: ./servico-paciente
    container_name: clinica-paciente
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_PACIENTE_URL: jdbc:mysql://clinica-mysql-paciente:3306/clinica_paciente
      SPRING_DATASOURCE_PACIENTE_USERNAME: root
      SPRING_DATASOURCE_PACIENTE_PASSWORD: root
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8083:8083"
    depends_on:
      mysql-paciente:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - clinica-net

  servico-atendimento:
    build: ./servico-atendimento
    container_name: clinica-atendimento
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_ATENDIMENTO_URL: jdbc:mysql://clinica-mysql-atendimento:3306/clinica_atendimento
      SPRING_DATASOURCE_ATENDIMENTO_USERNAME: root
      SPRING_DATASOURCE_ATENDIMENTO_PASSWORD: root
      SERVICO_PACIENTE_URL: http://servico-paciente:8083
      SERVICO_PROFISSIONAL_URL: http://servico-profissional:8082
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/atendimentos/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mysql-atendimento:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      servico-paciente:
        condition: service_started
      servico-profissional:
        condition: service_started
    networks:
      - clinica-net
  frontend-autenticacao:
    build: ./frontend-autenticacao
    container_name: clinica-auth-frontend
    ports:
      - "3000:80"
    depends_on:
      servico-autenticacao:
        condition: service_healthy
      servico-profissional:
        condition: service_started
      servico-paciente:
        condition: service_started
      servico-atendimento:
        condition: service_healthy
    networks:
      - clinica-net

volumes:
  mysql_data:
  mysql_profissional_data:
  mysql_paciente_data:

  mysql_atendimento_data:

networks:
  clinica-net:
    driver: bridge
