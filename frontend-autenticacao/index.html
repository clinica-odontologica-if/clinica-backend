<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinica Odontologica</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
<main id="tela-login" class="login-shell">
  <section class="login-brand" aria-label="Clinica Odontologica">
    <div class="brand-mark" aria-hidden="true">
      <span></span>
    </div>

    <div>
      <p class="eyebrow">Clinica Odontologica</p>
      <h1>Acesso ao sistema</h1>
      <p class="support-text">Entre com um usuario cadastrado para acessar os servicos da clinica.</p>
    </div>
  </section>

  <section class="login-area" aria-label="Formulario de login">
    <form id="loginForm" class="login-form">
      <div class="form-header">
        <div>
          <p class="eyebrow">Autenticacao</p>
          <h2>Login</h2>
        </div>
        <span id="apiStatus" class="status-pill">verificando</span>
      </div>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="username" value="gerente@clinica.com" required />

      <label for="senha">Senha</label>
      <input id="senha" name="senha" type="password" autocomplete="current-password" value="Gerente@2025" required />

      <button id="submitButton" type="submit">Entrar</button>
      <p id="message" class="message" role="status"></p>
    </form>
  </section>
</main>

<main id="tela-dashboard" class="dashboard-shell" hidden>
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">
        <div class="sidebar-mark" aria-hidden="true">
          <span></span>
        </div>
        <div>
          <strong>Clinica</strong>
          <small>Odontologica</small>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Menu principal">
        <button type="button" class="nav-item active" data-page="inicio">Inicio</button>
        <button type="button" class="nav-item" data-page="profissionais">Profissionais</button>
        <button type="button" class="nav-item" data-page="atendimentos">Atendimentos</button>
        <button type="button" class="nav-item" data-page="estoque">Estoque</button>
        <button type="button" class="nav-item" data-page="financeiro">Financeiro</button>
        <button type="button" class="nav-item" data-page="pacientes">Pacientes</button>
        <button type="button" class="nav-item" data-page="configuracoes">Configuracoes</button>
      </nav>
    </div>

    <div class="user-card">
      <div class="avatar" id="userInitials">U</div>
      <div class="user-info">
        <strong id="userName">Usuario</strong>
        <span id="userRole">Perfil</span>
      </div>
      <button id="logoutButton" type="button" class="logout-button">Sair</button>
    </div>
  </aside>

  <section class="main-panel">
    <header class="topbar">
      <div>
        <p class="eyebrow">Painel</p>
        <h2 id="pageTitle">Inicio</h2>
      </div>
      <span id="dashboardStatus" class="status-pill ok">online</span>
    </header>

    <section id="conteudo" class="content-area" aria-live="polite"></section>
  </section>
</main>

<template id="pagina-inicio">
  <div class="page-grid">
    <article class="metric-card">
      <span>Consultas hoje</span>
      <strong>0</strong>
    </article>
    <article class="metric-card">
      <span>Pacientes ativos</span>
      <strong>0</strong>
    </article>
    <article class="metric-card">
      <span>Status</span>
      <strong>Operando</strong>
    </article>
  </div>

  <article class="panel">
    <h3>Bem-vindo</h3>
    <p>Esta area esta pronta para receber as paginas futuras do sistema.</p>
  </article>
</template>

<template id="pagina-profissionais">
  <section class="workspace-grid">
    <article class="panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Equipe</p>
          <h3 id="profissionalFormTitulo">Cadastrar profissional</h3>
        </div>
        <span id="profissionaisStatus" class="status-pill">aguardando</span>
      </div>

      <form id="profissionalForm" class="data-form">
        <input id="profissionalId" name="id" type="hidden" />

        <label for="profissionalNome">Nome</label>
        <input id="profissionalNome" name="nome" type="text" autocomplete="name" required />

        <label for="profissionalEmail">Email</label>
        <input id="profissionalEmail" name="email" type="email" autocomplete="email" required />

        <label for="profissionalRole">Perfil</label>
        <select id="profissionalRole" name="role" required>
          <option value="ATENDENTE">Atendente</option>
          <option value="DENTISTA">Dentista</option>
          <option value="AUXILIAR">Auxiliar</option>
          <option value="GERENTE">Gerente</option>
        </select>

        <div id="camposDentista" class="conditional-fields" hidden>
          <label for="profissionalCro">CRO</label>
          <input id="profissionalCro" name="cro" type="text" />

          <label for="profissionalEspecialidade">Especialidade</label>
          <input id="profissionalEspecialidade" name="especialidade" type="text" />
        </div>

        <div class="form-actions">
          <button id="salvarProfissionalButton" type="submit" class="primary-button">Salvar</button>
          <button id="cancelarEdicaoProfissionalButton" type="button" class="secondary-button" hidden>Cancelar</button>
        </div>
        <p id="profissionalMessage" class="message" role="status"></p>
      </form>
    </article>

    <article class="panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Cadastros</p>
          <h3>Profissionais ativos</h3>
        </div>
        <button id="recarregarProfissionaisButton" type="button" class="secondary-button">Atualizar</button>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
          <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Perfil</th>
            <th>Detalhes</th>
            <th>Acoes</th>
          </tr>
          </thead>
          <tbody id="profissionaisTabela">
          <tr>
            <td colspan="5">Carregando...</td>
          </tr>
          </tbody>
        </table>
      </div>
    </article>
  </section>
</template>

<template id="pagina-atendimentos">
  <section class="workspace-grid">
    <article class="panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Agenda</p>
          <h3>Novo atendimento</h3>
        </div>
        <span id="atendimentosStatus" class="status-pill">aguardando</span>
      </div>

      <form id="atendimentoForm" class="data-form">
        <label for="atendimentoPacienteBusca">Paciente</label>
        <div class="lookup-row">
          <input id="atendimentoPacienteBusca" name="pacienteBusca" type="search" placeholder="Nome, CPF, telefone ou email" autocomplete="off" />
          <button id="buscarPacientesAtendimentoButton" type="button" class="secondary-button">Buscar</button>
        </div>
        <select id="atendimentoPacienteId" name="pacienteId" required>
          <option value="">Busque e selecione um paciente</option>
        </select>

        <label for="atendimentoProfissionalBusca">Dentista</label>
        <div class="lookup-row">
          <input id="atendimentoProfissionalBusca" name="profissionalBusca" type="search" placeholder="Nome, especialidade, CRO ou email" autocomplete="off" />
          <button id="buscarProfissionaisAtendimentoButton" type="button" class="secondary-button">Buscar</button>
        </div>
        <select id="atendimentoProfissionalId" name="profissionalId" required>
          <option value="">Busque e selecione um dentista</option>
        </select>

        <div class="form-grid-3">
          <div>
            <label for="atendimentoData">Data</label>
            <input id="atendimentoData" name="data" type="date" required />
          </div>
          <div>
            <label for="atendimentoHora">Horario</label>
            <input id="atendimentoHora" name="hora" type="time" required />
          </div>
          <div>
            <label for="atendimentoDuracaoMinutos">Duracao (min)</label>
            <input id="atendimentoDuracaoMinutos" name="duracaoMinutos" type="number" min="15" max="480" step="15" value="60" required />
          </div>
        </div>

        <label for="atendimentoObservacoes">Observacoes</label>
        <textarea id="atendimentoObservacoes" name="observacoes" rows="4"></textarea>

        <div class="form-actions">
          <button id="salvarAtendimentoButton" type="submit" class="primary-button">Agendar</button>
          <button id="limparAtendimentoButton" type="button" class="secondary-button">Limpar</button>
        </div>
        <p id="atendimentoMessage" class="message" role="status"></p>
      </form>
    </article>

    <article class="panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Atendimentos</p>
          <h3>Agenda</h3>
        </div>
        <button id="recarregarAtendimentosButton" type="button" class="secondary-button">Atualizar</button>
      </div>

      <form id="atendimentoFiltroForm" class="filters-bar">
        <input id="filtroAtendimentoData" name="data" type="date" aria-label="Filtrar por data" />
        <select id="filtroAtendimentoStatus" name="status" aria-label="Filtrar por status">
          <option value="">Todos os status</option>
          <option value="AGENDADO">Agendado</option>
          <option value="CONFIRMADO">Confirmado</option>
          <option value="REALIZADO">Realizado</option>
          <option value="CANCELADO">Cancelado</option>
          <option value="NAO_COMPARECEU">Nao compareceu</option>
        </select>
        <button type="submit" class="secondary-button">Filtrar</button>
      </form>

      <section id="realizacaoAtendimentoPanel" class="inline-editor" hidden>
        <div class="panel-heading compact-heading">
          <div>
            <p class="eyebrow">Execucao</p>
            <h3 id="realizacaoAtendimentoTitulo">Realizar atendimento</h3>
          </div>
          <button id="fecharRealizacaoAtendimentoButton" type="button" class="secondary-button">Fechar</button>
        </div>

        <form id="realizacaoAtendimentoForm" class="data-form">
          <input id="realizacaoAtendimentoId" name="id" type="hidden" />

          <label for="realizacaoProcedimento">Procedimento realizado</label>
          <input id="realizacaoProcedimento" name="procedimentoRealizado" type="text" maxlength="255" required />

          <label for="realizacaoObservacoes">Observacoes</label>
          <textarea id="realizacaoObservacoes" name="observacoes" rows="3"></textarea>

          <label for="realizacaoValor">Valor</label>
          <input id="realizacaoValor" name="valor" type="number" min="0" step="0.01" />

          <div class="form-actions">
            <button id="salvarRealizacaoButton" type="submit" class="primary-button">Realizar</button>
            <button id="cancelarRealizacaoButton" type="button" class="secondary-button">Cancelar</button>
          </div>
          <p id="realizacaoAtendimentoMessage" class="message" role="status"></p>
        </form>
      </section>

      <div class="table-wrap">
        <table class="data-table agenda-table">
          <thead>
          <tr>
            <th>Data</th>
            <th>Horario</th>
            <th>Duracao</th>
            <th>Paciente</th>
            <th>Dentista</th>
            <th>Status</th>
            <th>Observacoes</th>
            <th>Acoes</th>
          </tr>
          </thead>
          <tbody id="atendimentosTabela">
          <tr>
            <td colspan="8">Carregando...</td>
          </tr>
          </tbody>
        </table>
      </div>
    </article>
  </section>
</template>

<template id="pagina-pacientes">
  <section class="workspace-grid">
    <article class="panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Cadastro</p>
          <h3 id="pacienteFormTitulo">Cadastrar paciente</h3>
        </div>
        <span id="pacientesStatus" class="status-pill">aguardando</span>
      </div>

      <form id="pacienteForm" class="data-form">
        <input id="pacienteId" name="id" type="hidden" />

        <label for="pacienteNome">Nome</label>
        <input id="pacienteNome" name="nome" type="text" autocomplete="name" required />

        <label for="pacienteCpf">CPF</label>
        <input id="pacienteCpf" name="cpf" type="text" inputmode="numeric" placeholder="000.000.000-00" required />

        <label for="pacienteDataNascimento">Data de nascimento</label>
        <input id="pacienteDataNascimento" name="dataNascimento" type="date" required />

        <label for="pacienteTelefone">Telefone</label>
        <input id="pacienteTelefone" name="telefone" type="tel" autocomplete="tel" placeholder="(00) 00000-0000" required />

        <label for="pacienteEmail">Email</label>
        <input id="pacienteEmail" name="email" type="email" autocomplete="email" />

        <label for="pacienteEndereco">Endereco</label>
        <input id="pacienteEndereco" name="endereco" type="text" autocomplete="street-address" />

        <label for="pacienteObservacoes">Observacoes</label>
        <textarea id="pacienteObservacoes" name="observacoes" rows="4"></textarea>

        <div class="form-actions">
          <button id="salvarPacienteButton" type="submit" class="primary-button">Salvar</button>
          <button id="cancelarEdicaoPacienteButton" type="button" class="secondary-button" hidden>Cancelar</button>
        </div>
        <p id="pacienteMessage" class="message" role="status"></p>
      </form>
    </article>

    <article class="panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Cadastros</p>
          <h3>Pacientes ativos</h3>
        </div>
        <button id="recarregarPacientesButton" type="button" class="secondary-button">Atualizar</button>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Telefone</th>
            <th>Email</th>
            <th>Acoes</th>
          </tr>
          </thead>
          <tbody id="pacientesTabela">
          <tr>
            <td colspan="5">Carregando...</td>
          </tr>
          </tbody>
        </table>
      </div>
    </article>
  </section>
</template>


<template id="pagina-estoque">
  <section class="workspace-grid estoque-grid">
    <article class="panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Materiais</p>
          <h3 id="materialFormTitulo">Cadastrar material</h3>
        </div>
        <span id="estoqueStatus" class="status-pill">aguardando</span>
      </div>

      <form id="materialForm" class="data-form">
        <input id="materialId" name="id" type="hidden" />
        <label for="materialNome">Nome</label>
        <input id="materialNome" name="nome" type="text" required />
        <label for="materialDescricao">Descricao</label>
        <input id="materialDescricao" name="descricao" type="text" />
        <div class="form-grid-2">
          <div>
            <label for="materialCategoria">Categoria</label>
            <select id="materialCategoria" name="categoria"></select>
            <input id="materialCategoriaOutra" name="categoriaOutra" type="text" placeholder="Nova categoria" hidden />
          </div>
          <div>
            <label for="materialUnidadeMedida">Unidade</label>
            <select id="materialUnidadeMedida" name="unidadeMedida" required>
              <option value="UNIDADE">Unidade</option>
              <option value="CAIXA">Caixa</option>
              <option value="PACOTE">Pacote</option>
              <option value="ML">ML</option>
              <option value="MG">MG</option>
              <option value="G">G</option>
            </select>
          </div>
        </div>
        <div class="form-grid-2">
          <div>
            <label for="materialQuantidadeAtual">Quantidade atual</label>
            <input id="materialQuantidadeAtual" name="quantidadeAtual" type="number" min="0" step="0.01" value="0" />
          </div>
          <div>
            <label for="materialQuantidadeMinima">Quantidade minima</label>
            <input id="materialQuantidadeMinima" name="quantidadeMinima" type="number" min="0" step="0.01" value="0" required />
          </div>
        </div>
        <div class="form-actions">
          <button id="salvarMaterialButton" type="submit" class="primary-button">Salvar</button>
          <button id="cancelarEdicaoMaterialButton" type="button" class="secondary-button" hidden>Cancelar</button>
        </div>
        <p id="materialMessage" class="message" role="status"></p>
      </form>
    </article>

    <article class="panel">
      <div class="panel-heading"><div><p class="eyebrow">Movimentacao</p><h3>Registrar estoque</h3></div></div>
      <form id="movimentacaoForm" class="data-form">
        <label for="movimentacaoMaterialId">Material</label>
        <select id="movimentacaoMaterialId" name="materialId" required><option value="">Selecione um material</option></select>
        <div class="form-grid-2">
          <div>
            <label for="movimentacaoTipo">Tipo</label>
            <select id="movimentacaoTipo" name="tipo" required>
              <option value="ENTRADA">Entrada</option>
              <option value="SAIDA">Saida</option>
              <option value="AJUSTE">Ajuste</option>
            </select>
          </div>
          <div>
            <label for="movimentacaoQuantidade">Quantidade</label>
            <input id="movimentacaoQuantidade" name="quantidade" type="number" min="0" step="0.01" required />
          </div>
        </div>
        <label for="movimentacaoMotivo">Motivo</label>
        <input id="movimentacaoMotivo" name="motivo" type="text" placeholder="Obrigatorio para saida e ajuste" />
        <div class="form-actions single-action"><button id="registrarMovimentacaoButton" type="submit" class="primary-button">Registrar</button></div>
        <p id="movimentacaoMessage" class="message" role="status"></p>
      </form>
    </article>
  </section>

  <article class="panel">
    <div class="panel-heading">
      <div><p class="eyebrow">Saldos</p><h3>Materiais cadastrados</h3></div>
      <button id="recarregarMateriaisButton" type="button" class="secondary-button">Atualizar</button>
    </div>
    <form id="materialFiltroForm" class="filters-bar estoque-filters">
      <input id="filtroMaterialBusca" name="busca" type="search" placeholder="Buscar material" aria-label="Buscar material" />
      <select id="filtroMaterialCategoria" name="categoria" aria-label="Categoria"></select>
      <select id="filtroMaterialBaixoEstoque" name="baixoEstoque" aria-label="Baixo estoque">
        <option value="">Todos</option>
        <option value="true">Baixo estoque</option>
        <option value="false">Estoque ok</option>
      </select>
      <button type="submit" class="secondary-button">Filtrar</button>
    </form>
    <div class="table-wrap"><table class="data-table estoque-table"><thead><tr><th>Material</th><th>Categoria</th><th>Saldo</th><th>Minimo</th><th>Status</th><th>Acoes</th></tr></thead><tbody id="materiaisTabela"><tr><td colspan="6">Carregando...</td></tr></tbody></table></div>
  </article>
</template>

<template id="pagina-financeiro">
  <section class="finance-summary">
    <article class="metric-card"><span>Receitas</span><strong id="financeiroTotalReceitas">R$ 0,00</strong></article>
    <article class="metric-card"><span>Despesas</span><strong id="financeiroTotalDespesas">R$ 0,00</strong></article>
    <article class="metric-card"><span>Saldo</span><strong id="financeiroSaldo">R$ 0,00</strong></article>
  </section>
  <section class="workspace-grid financeiro-grid">
    <article class="panel">
      <div class="panel-heading"><div><p class="eyebrow">Receitas</p><h3>Registrar pagamento</h3></div><span id="financeiroStatus" class="status-pill">aguardando</span></div>
      <form id="receitaForm" class="data-form">
        <label for="receitaAtendimentoId">Atendimento</label><input id="receitaAtendimentoId" name="atendimentoId" type="number" min="1" required />
        <label for="receitaDescricao">Descricao</label><input id="receitaDescricao" name="descricao" type="text" value="Pagamento de atendimento" />
        <div class="form-grid-2"><div><label for="receitaValor">Valor</label><input id="receitaValor" name="valor" type="number" min="0.01" step="0.01" required /></div><div><label for="receitaFormaPagamento">Forma</label><select id="receitaFormaPagamento" name="formaPagamento" required><option value="PIX">PIX</option><option value="DINHEIRO">Dinheiro</option><option value="CARTAO_CREDITO">Cartao credito</option><option value="CARTAO_DEBITO">Cartao debito</option><option value="CONVENIO">Convenio</option></select></div></div>
        <div class="form-grid-2"><div><label for="receitaStatus">Status</label><select id="receitaStatus" name="status"><option value="PENDENTE">Pendente</option><option value="PAGO">Pago</option></select></div><div><label for="receitaDataPagamento">Pagamento</label><input id="receitaDataPagamento" name="dataPagamento" type="date" /></div></div>
        <label for="receitaDataVencimento">Vencimento</label><input id="receitaDataVencimento" name="dataVencimento" type="date" />
        <div class="form-actions single-action"><button id="salvarReceitaButton" type="submit" class="primary-button">Registrar receita</button></div><p id="receitaMessage" class="message" role="status"></p>
      </form>
    </article>
    <article class="panel">
      <div class="panel-heading"><div><p class="eyebrow">Despesas</p><h3>Registrar despesa</h3></div></div>
      <form id="despesaForm" class="data-form">
        <label for="despesaDescricao">Descricao</label><input id="despesaDescricao" name="descricao" type="text" required />
        <div class="form-grid-2"><div><label for="despesaCategoria">Categoria</label><select id="despesaCategoria" name="categoria" required><option value="MATERIAL">Material</option><option value="SALARIO">Salario</option><option value="ALUGUEL">Aluguel</option><option value="MANUTENCAO">Manutencao</option><option value="IMPOSTO">Imposto</option><option value="OUTROS">Outros</option></select></div><div><label for="despesaValor">Valor</label><input id="despesaValor" name="valor" type="number" min="0.01" step="0.01" required /></div></div>
        <div class="form-grid-2"><div><label for="despesaStatus">Status</label><select id="despesaStatus" name="status"><option value="PENDENTE">Pendente</option><option value="PAGO">Pago</option></select></div><div><label for="despesaDataPagamento">Pagamento</label><input id="despesaDataPagamento" name="dataPagamento" type="date" /></div></div>
        <label for="despesaDataVencimento">Vencimento</label><input id="despesaDataVencimento" name="dataVencimento" type="date" />
        <div class="form-actions single-action"><button id="salvarDespesaButton" type="submit" class="primary-button">Registrar despesa</button></div><p id="despesaMessage" class="message" role="status"></p>
      </form>
    </article>
  </section>
  <article class="panel">
    <div class="panel-heading"><div><p class="eyebrow">Relatorio</p><h3>Movimento financeiro</h3></div><button id="recarregarFinanceiroButton" type="button" class="secondary-button">Atualizar</button></div>
    <form id="financeiroFiltroForm" class="filters-bar financeiro-filters"><input id="financeiroDataInicio" name="dataInicio" type="date" required aria-label="Data inicial" /><input id="financeiroDataFim" name="dataFim" type="date" required aria-label="Data final" /><button type="submit" class="secondary-button">Gerar</button></form>
