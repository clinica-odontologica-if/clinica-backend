spring:
  application:
    name: servico-atendimento

  config:
    import: "optional:configserver:http://localhost:8888"

  datasource:
    url: ${SPRING_DATASOURCE_ATENDIMENTO_URL:jdbc:mysql://localhost:3310/clinica_atendimento}
    username: ${SPRING_DATASOURCE_ATENDIMENTO_USERNAME:root}
    password: ${SPRING_DATASOURCE_ATENDIMENTO_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8084
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET:desenvolvimento-local-chave-minima-32-chars}

clinica:
  servico-paciente:
    url: ${SERVICO_PACIENTE_URL:http://localhost:8083}
  servico-profissional:
    url: ${SERVICO_PROFISSIONAL_URL:http://localhost:8082}
