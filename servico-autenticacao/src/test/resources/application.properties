spring.cloud.config.enabled=false

# Datasource será injetado dinamicamente pelo Testcontainers via @DynamicPropertySource
# Não defina url/username/password aqui ? o teste sobrescreve em tempo de execução

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Necessário para o application.yml principal não quebrar ao resolver essas variáveis
admin.senha.gerente=ignorado
admin.senha.atendente=ignorado
admin.senha.dentista=ignorado
admin.senha.auxiliar=ignorado

jwt.secret=desenvolvimento-local-chave-minima-32-chars
jwt.expiracao-ms=28800000

