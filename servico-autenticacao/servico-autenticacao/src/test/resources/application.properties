spring.cloud.config.enabled=false
spring.datasource.url=jdbc:h2:mem:clinica_auth;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

admin.senha.gerente=gerente-test
admin.senha.atendente=atendente-test
admin.senha.dentista=dentista-test
admin.senha.auxiliar=auxiliar-test
