spring:
  application:
    name: servico-autenticacao

  config:
    import: >
      optional:configserver:http://localhost:8888,
      optional:file:.env[.properties],
      optional:file:../../.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:3306/clinica_auth
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.security: DEBUG

admin:
  senha:
    gerente: ${ADMIN_SENHA_GERENTE}
    atendente: ${ADMIN_SENHA_ATENDENTE}
    dentista: ${ADMIN_SENHA_DENTISTA}
    auxiliar: ${ADMIN_SENHA_AUXILIAR}