spring.application.name=servico-autenticacao
spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]

# Banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/clinica_auth
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Porta do servico
server.port=8081
logging.level.org.springframework.security=DEBUG
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

admin.senha.gerente=${ADMIN_SENHA_GERENTE}
admin.senha.atendente=${ADMIN_SENHA_ATENDENTE}
admin.senha.dentista=${ADMIN_SENHA_DENTISTA}
admin.senha.auxiliar=${ADMIN_SENHA_AUXILIAR}
