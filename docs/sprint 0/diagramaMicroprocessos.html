faç<svg width="1400" height="980" viewBox="0 0 1400 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de Microsserviços - Clínica em Rede</title>
  <desc id="desc">Arquitetura distribuída com gateway, serviços de autenticaçao, paciente, profissional, atendimento, estoque e financeiro.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .subtitle { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #4b5d73; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #516173; }
      .box { fill: #ffffff; stroke: #2c5c85; stroke-width: 2; rx: 18; ry: 18; }
      .box-soft { fill: #eef5fb; stroke: #6d9dc5; stroke-width: 2; rx: 18; ry: 18; }
      .box-accent { fill: #dff1ea; stroke: #2f7a5d; stroke-width: 2; rx: 18; ry: 18; }
      .box-db { fill: #fff4dd; stroke: #c28a1a; stroke-width: 2; rx: 18; ry: 18; }
      .line { stroke: #4b6785; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #7a93ae; stroke-width: 2; fill: none; marker-end: url(#arrowSoft); stroke-dasharray: 7 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b6785"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a93ae"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="980"/>

  <text class="title" x="60" y="60">Clínica em Rede</text>
  <text class="subtitle" x="60" y="88">Arquitetura de microsserviços para gestão de consultório odontológico</text>

  <text class="section" x="90" y="155">Camada de acesso</text>
  <rect class="box-soft" x="80" y="180" width="220" height="90" rx="18" ry="18"/>
  <text class="label" x="130" y="220">Usuário</text>
  <text class="small" x="108" y="245">Gerente, atendente,</text>
  <text class="small" x="111" y="264">dentista, auxiliar</text>

  <rect class="box-soft" x="370" y="180" width="240" height="90" rx="18" ry="18"/>
  <text class="label" x="422" y="220">Interface Web</text>
  <text class="small" x="421" y="245">Painel e telas do sistema</text>

  <rect class="box-accent" x="690" y="180" width="240" height="90" rx="18" ry="18"/>
  <text class="label" x="752" y="220">API Gateway</text>
  <text class="small" x="718" y="245">Entrada única dos serviços</text>

  <path class="line" d="M300 225 L370 225"/>
  <path class="line" d="M610 225 L690 225"/>

  <text class="section" x="60" y="345">Microsserviços principais</text>

  <rect class="box" x="70" y="380" width="260" height="110" rx="18" ry="18"/>
  <text class="label" x="118" y="420">servico-autenticacao</text>
  <text class="small" x="108" y="445">Login, autenticação e perfis</text>
  <text class="small" x="125" y="466">Controle de acesso</text>

  <rect class="box" x="390" y="380" width="260" height="110" rx="18" ry="18"/>
  <text class="label" x="430" y="420">servico-paciente</text>
  <text class="small" x="447" y="445">Cadastro de paciente</text>
  <text class="small" x="432" y="466">Consulta e atualização</text>

  <rect class="box" x="710" y="380" width="260" height="110" rx="18" ry="18"/>
  <text class="label" x="724" y="420">servico-profissional</text>
  <text class="small" x="765" y="445">Dentista, auxiliar</text>
  <text class="small" x="797" y="466">e especialidade</text>

  <rect class="box" x="1030" y="380" width="260" height="110" rx="18" ry="18"/>
  <text class="label" x="1050" y="420">servico-atendimento</text>
  <text class="small" x="1088" y="445">Agenda e consulta</text>
  <text class="small" x="1062" y="466">Status do atendimento</text>

  <rect class="box" x="230" y="560" width="260" height="110" rx="18" ry="18"/>
  <text class="label" x="255" y="600">servico-estoque</text>
  <text class="small" x="293" y="625">Material e estoque</text>
  <text class="small" x="286" y="646">Entrada e saida</text>

  <rect class="box" x="710" y="560" width="260" height="110" rx="18" ry="18"/>
  <text class="label" x="753" y="600">servico-financeiro</text>
  <text class="small" x="785" y="625">Pagamento e gasto</text>
  <text class="small" x="765" y="646">Controle financeiro</text>

  <path class="line" d="M810 270 L200 380"/>
  <path class="line" d="M810 270 L520 380"/>
  <path class="line" d="M810 270 L840 380"/>
  <path class="line" d="M810 270 L1160 380"/>
  <path class="line" d="M810 270 L360 560"/>
  <path class="line" d="M810 270 L840 560"/>

  <path class="line-soft" d="M1160 490 L1160 525 L840 525 L840 560"/>
  <path class="line-soft" d="M1160 490 L1160 525 L360 525 L360 560"/>
  <path class="line-soft" d="M1160 435 L970 435"/>
  <path class="line-soft" d="M1030 435 L650 435"/>

  <text class="section" x="90" y="765">Persistência</text>
  <rect class="box-db" x="430" y="790" width="540" height="110" rx="18" ry="18"/>
  <text class="label" x="560" y="835">Banco de Dados Relacional</text>
  <text class="small" x="523" y="860">MySQL em container Docker</text>

  <path class="line" d="M200 490 L200 735 L520 735 L520 790"/>
  <path class="line" d="M520 490 L520 790"/>
  <path class="line" d="M840 490 L840 790"/>
  <path class="line" d="M1160 490 L1160 735 L880 735 L880 790"/>
  <path class="line" d="M360 670 L360 735 L640 735 L640 790"/>
  <path class="line" d="M840 670 L840 790"/>

  <text class="section" x="1010" y="765">Versão minima viável</text>
  <rect class="box-soft" x="1000" y="790" width="300" height="130" rx="18" ry="18"/>
  <text class="label" x="1038" y="825">Primeira implementação</text>
  <text class="small" x="1030" y="852">1. servico-autenticacao</text>
  <text class="small" x="1030" y="874">2. servico-paciente</text>
  <text class="small" x="1030" y="896">3. servico-atendimento</text>

  <text class="small" x="82" y="942">Fluxos pontilhados indicam comunicação entre serviços. Para a faculdade, vocês podem usar um banco único em container e separar melhor os serviços ao longo das sprints.</text>
</svg>
