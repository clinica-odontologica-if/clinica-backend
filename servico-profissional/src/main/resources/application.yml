spring:
  application:
    name: servico-profissional

  config:
    import: >
      optional:configserver:http://localhost:8888,
      optional:file:.env[.properties],
      optional:file:../../.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:3306/clinica_profissional
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8082
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.security: DEBUG
