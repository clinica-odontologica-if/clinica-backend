spring:
  application:
    name: servico-profissional

  config:
    import: "optional:configserver:http://localhost:8888"

  datasource:
    url: ${SPRING_DATASOURCE_PROFISSIONAL_URL:jdbc:mysql://localhost:3308/clinica_profissional}
    username: ${SPRING_DATASOURCE_PROFISSIONAL_USERNAME:root}
    password: ${SPRING_DATASOURCE_PROFISSIONAL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8082
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.security: DEBUG


jwt:
  secret: ${JWT_SECRET:desenvolvimento-local-chave-minima-32-chars}

clinica:
  servico-autenticacao:
    url: ${SERVICO_AUTENTICACAO_URL:http://localhost:8081}
