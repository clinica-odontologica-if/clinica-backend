name: CI - Serviço de Profissional

on:
  push:
    branches:
      - '**'
    paths:
      - 'servico-profissional/**'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'servico-profissional/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./servico-profissional

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Executar Testes do Serviço de Profissional
        run: mvn clean test
